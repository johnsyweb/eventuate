name: CI/CD

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

env:
  PUPPETEER_SKIP_DOWNLOAD: true

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Validation jobs - run in parallel
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Lint
        run: mise run test:lint

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Format check
        run: mise run test:format

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Test
        run: mise run test:units

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Cache bundler gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: docs/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('docs/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Run Lighthouse
        run: mise run lighthouse

  # Build after all validation passes
  build:
    needs: [lint, format-check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Build
        run: aube run build

      - name: Verify package for Firefox
        run: aube run web-ext:lint

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: |
            eventuate.js
            eventuate.bookmarklet.js
            eventuate.user.js
          retention-days: 1

  # Check if changes are docs-only (for release and pages deployment)
  check-docs-only:
    runs-on: ubuntu-latest
    outputs:
      skip-release: ${{ steps.check.outputs.skip-release }}
      should-deploy-pages: ${{ steps.check.outputs.should-deploy-pages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check if changes are docs-only
        id: check
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            # Not a push to main, return defaults
            echo "Not a push to main, using defaults"
            echo "skip-release=false" >> ${GITHUB_OUTPUT}
            echo "should-deploy-pages=false" >> ${GITHUB_OUTPUT}
            exit 0
          fi

          # Get the commit SHA
          commit_sha="${{ github.sha }}"

          # Get the parent commit
          parent_sha=$(git rev-parse ${commit_sha}^ 2>/dev/null || echo "")

          if [ -n "$parent_sha" ]; then
            # Check files changed between parent and current commit
            changed_files=$(git diff --name-only ${parent_sha} ${commit_sha} 2>/dev/null || echo "")
          else
            # Fallback: check files changed in the last commit
            changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi

          # Check if all changed files are in docs/ or .github/
          non_docs_files=$(echo "$changed_files" | grep -v "^docs/" | grep -v "^\.github/" | grep -v "^$" || true)

          if [ -z "$non_docs_files" ]; then
            echo "All changes are in docs/ or .github/, skipping release but deploying Pages"
            echo "skip-release=true" >> ${GITHUB_OUTPUT}
            echo "should-deploy-pages=true" >> ${GITHUB_OUTPUT}
          else
            echo "Non-docs files changed, proceeding with release"
            echo "Changed files:"
            echo "$changed_files"
            echo "skip-release=false" >> ${GITHUB_OUTPUT}
            echo "should-deploy-pages=false" >> ${GITHUB_OUTPUT}
          fi

  # Release - only on main branch push (unless docs-only)
  release:
    needs: [build, check-docs-only]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check-docs-only.outputs.skip-release != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Cache bundler gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: docs/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('docs/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Version before release
        id: version-before
        run: echo "version=$(jq -r .version amo.json)" >> ${GITHUB_OUTPUT}

      - name: Semantic Release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: aube run release

      - name: Version after release
        id: version-after
        run: echo "version=$(jq -r .version amo.json)" >> ${GITHUB_OUTPUT}

      - name: Sign and submit to AMO
        if:
          steps.version-before.outputs.version !=
          steps.version-after.outputs.version
        run: |
          echo "Signing and submitting v${{steps.version-after.outputs.version}} to AMO [was v${{steps.version-before.outputs.version}}]"
          aube exec web-ext sign
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}

      - name: Upload release build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-release
          path: |
            eventuate.js
            eventuate.bookmarklet.js
            eventuate.user.js
          retention-days: 1

  # Deploy Pages after release (when we are releasing)
  deploy-pages-after-release:
    needs: [release, check-docs-only, lighthouse]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check-docs-only.outputs.skip-release != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Cache bundler gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: docs/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('docs/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Build docs
        run: aube run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artefact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './docs/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # Deploy Pages after build (when not releasing: docs-only, workflow_dispatch, or release event)
  deploy-pages-after-build:
    needs: [build, check-docs-only, lighthouse]
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-docs-only.outputs.should-deploy-pages == 'true')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref:
            ${{ github.event.release.target_commitish || github.ref || 'main' }}
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Cache bundler gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: docs/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('docs/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Build docs
        run: aube run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artefact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './docs/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
