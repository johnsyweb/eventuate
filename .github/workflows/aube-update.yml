name: Update npm dependencies

on:
  schedule:
    - cron: '0 7 * * 1' # Every Monday at 07:00 UTC (after CI)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true

      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/aube/store/v1
          key: ${{ runner.os }}-aube-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-

      - name: Bootstrap dependencies
        run: mise run bootstrap

      - name: Update dependencies
        run: aube update --latest

      - name: Audit dependencies
        run: aube audit

      - name: Run tests
        run: mise run test

      - name: Create pull request
        uses: peter-evans/create-pull-request@271a8d4a0803a34955dd159102031f8e62f55259 # v7
        with:
          commit-message: 'chore(deps): update npm dependencies'
          title: 'chore(deps): update npm dependencies'
          body: |
            Weekly automated dependency update via aube.

            Requires manual review for allowBuilds changes and security advisories.
          branch: chore/aube-deps-update
          delete-branch: true
